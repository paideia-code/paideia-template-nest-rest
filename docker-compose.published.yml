# Modo imagen publicada
# Usa la imagen de GHCR sin build del código local
# Uso script: npm run compose:published
# Uso: docker compose -f docker-compose.published.yml up -d

services:
  app:
    image: ghcr.io/paideia-code/paideia-template-nest-rest:main
    container_name: app_paideia_template_nest_rest
    ports:
      - '${PORT}:${PORT}'
    environment:
      PORT: ${PORT}
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SYNCHRONIZE: 'false'
      DB_LOGGING: 'false'
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: db_paideia_template_nest_rest
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
