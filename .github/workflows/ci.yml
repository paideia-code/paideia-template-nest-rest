name: CI

on:
  push:
    branches: [main]

jobs:
  read-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pkg.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: pkg
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

  docker:
    needs: read-version
    uses: paideia-code/paideia-infra-pipelines/.github/workflows/docker-publish.yml@main
    with:
      image-name: paideia-template-nest-rest
      version: ${{ needs.read-version.outputs.version }}
    permissions:
      contents: read
      packages: write
